<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>روح لقاعتك | ارتواء</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cairo:wght@600;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
:root{
  --pix:'Press Start 2P','Cairo','Tajawal',sans-serif;
  --arab:'Cairo','Tajawal',sans-serif;
  --apph:100vh;
}
@supports (height: 100dvh){
  :root{--apph:100dvh;}
}
body{
  background:#1a2930;color:#e8f5f0;font-family:var(--arab);
  min-height:var(--apph);display:flex;flex-direction:column;align-items:stretch;justify-content:stretch;
  overflow:hidden;user-select:none;-webkit-user-select:none;
  overscroll-behavior:none;
}
/* ── wrapper */
#G{position:fixed;inset:0;display:flex;flex-direction:column;align-items:stretch;width:100vw;height:var(--apph);max-width:none;padding:0;touch-action:none;}

/* ── TOP HUD (only visible during play) */
#hud{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:calc(7px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 7px calc(16px + env(safe-area-inset-left));
  background:rgba(37,50,59,0.97);
  border:1px solid rgba(40,181,143,0.28);border-radius:14px 14px 0 0;
}
.hb{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:54px;}
.hl{font-size:9px;color:rgba(40,181,143,0.55);letter-spacing:.12em;font-family:var(--pix);text-transform:uppercase;}
.hv{font-size:20px;font-weight:700;font-family:var(--pix);color:#e8f5f0;}
.hv.low{color:#ff6b6b;animation:blk .5s infinite;}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}
#tgt-wrap{text-align:center;flex:1;}
#tgt{font-family:var(--pix);font-size:26px;font-weight:900;color:#28b58f;letter-spacing:.06em;}
#tsub{font-size:10px;color:rgba(40,181,143,.45);margin-top:1px;}

/* ── CANVAS ZONE */
#cw{width:100%;flex:1;min-height:0;position:relative;background:#1e2d35;
  border-left:1px solid rgba(40,181,143,.2);border-right:1px solid rgba(40,181,143,.2);}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;}
#cc{position:absolute;inset:0;pointer-events:none;z-index:5;width:100%;}

/* ── BOTTOM BAR (only during play) */
#bar{
  width:100%;background:rgba(37,50,59,0.97);
  border:1px solid rgba(40,181,143,.28);border-radius:0 0 14px 14px;
  padding:8px calc(12px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:center;gap:8px;
}
#msg{font-size:12px;color:rgba(232,245,240,.45);text-align:center;
  font-family:var(--arab);flex:1;line-height:1.45;}
#msg.ok{color:#28b58f;font-weight:700;}
#msg.bad{color:#ff8f8f;font-weight:700;}
#msg.tip{color:#f4b942;}

/* ── DPAD — perfect symmetric 3×3 */
#dp{
  display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(3,40px);
  grid-template-areas:
    ". up ."
    "left act right"
    ". down .";
  direction:ltr;
  gap:4px;flex-shrink:0;
}
#d-up{grid-area:up;}
#d-left{grid-area:left;}
#d-right{grid-area:right;}
#d-down{grid-area:down;}
#d-act{grid-area:act;}
.db{
  width:40px;height:40px;background:rgba(37,50,59,.85);
  border:1px solid rgba(40,181,143,.25);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;color:#e8f5f0;
  unicode-bidi:isolate;
  touch-action:none;-webkit-tap-highlight-color:transparent;
  transition:background .1s,border-color .1s;
}
.db:active,.db.on{background:rgba(40,181,143,.28);border-color:#28b58f;}
.db.x{background:none;border:none;pointer-events:none;}

/* ── OVERLAY — covers canvas only, IS the start/end screen */
#ov{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(22,36,44,.97);gap:10px;padding:18px 20px;overflow:hidden;
}
#ov.hide{display:none;}

.ov-home{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.pixbg{position:absolute;inset:0;pointer-events:none;opacity:.42;overflow:hidden;}
.pixbg::before{
  content:"";position:absolute;inset:-20%;
  background:
    repeating-linear-gradient(0deg,rgba(40,181,143,.06) 0 1px,transparent 1px 10px),
    repeating-linear-gradient(90deg,rgba(40,181,143,.045) 0 1px,transparent 1px 10px);
  animation:pixshift 6s steps(18,end) infinite;
}
@keyframes pixshift{0%{transform:translate(0,0)}100%{transform:translate(40px,24px)}}
.px{
  position:absolute;background:rgba(40,181,143,.55);
  box-shadow:0 0 0 1px rgba(40,181,143,.12);
  border-radius:2px;
  animation:floatpx var(--dur,7s) steps(20,end) infinite;
  transform:translate(0,0);
}
@keyframes floatpx{
  0%{transform:translate(0,0);opacity:0}
  10%{opacity:var(--op,.65)}
  90%{opacity:var(--op,.65)}
  100%{transform:translate(var(--dx,80px),var(--dy,-120px));opacity:0}
}
.home-title{
  font-family:var(--arab);
  font-size:clamp(56px,9.5vw,92px);
  letter-spacing:0;
  word-spacing:0;
  line-height:1.05;
  text-align:center;
  direction:rtl;
  unicode-bidi:isolate;
  white-space:nowrap;
  color:#28b58f;
  text-shadow:0 0 0 rgba(40,181,143,0);
  animation:titlePop .55s steps(6,end) both, titleGlow 2.2s steps(10,end) infinite .55s;
  margin-top:-28px;
}
@keyframes titlePop{
  0%{transform:translateY(10px) scale(.98);opacity:0}
  100%{transform:translateY(0) scale(1);opacity:1}
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 0 rgba(40,181,143,0)}
  50%{text-shadow:0 0 18px rgba(40,181,143,.28)}
}
.home-sub{font-size:12px;color:rgba(232,245,240,.5);text-align:center;font-family:var(--arab);line-height:1.5}

/* gamified title bar inside overlay */
.ov-title{
  font-family:var(--pix);font-size:clamp(22px,5vw,30px);
  font-weight:900;color:#28b58f;text-align:center;line-height:1.2;
}
.ov-sub{font-size:12px;color:rgba(232,245,240,.45);text-align:center;font-family:var(--arab);line-height:1.5;}

/* score card (shown after game) */
.score-card{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(40,181,143,.08);border:1px solid rgba(40,181,143,.25);
  border-radius:14px;padding:12px 36px;
}
.sc-num{font-family:var(--pix);font-size:clamp(44px,10vw,64px);font-weight:900;color:#28b58f;line-height:1;}
.sc-lbl{font-size:12px;color:rgba(232,245,240,.4);font-family:var(--arab);}
.score-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.score-card.small{padding:10px 18px;min-width:150px;}
.score-card.small .sc-num{font-size:clamp(26px,6vw,40px);}
.score-card.small .sc-lbl{font-size:11px;}

/* instruction section */
.instr-hdr{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:rgba(40,181,143,.7);letter-spacing:.1em;
  font-family:var(--arab);text-transform:uppercase;font-weight:700;
  width:100%;max-width:340px;
}
.instr-line{flex:1;height:1px;background:rgba(40,181,143,.2);}
.instr-box{
  background:rgba(37,50,59,.9);border:1px solid rgba(40,181,143,.18);
  border-radius:11px;padding:9px 13px;width:100%;max-width:340px;
}
.ir{display:flex;align-items:center;gap:9px;margin-bottom:6px;font-size:13px;color:#b8d8d0;font-family:var(--arab);line-height:1.4;}
.ir:last-child{margin-bottom:0;}
.ib{
  min-width:36px;height:19px;background:rgba(40,181,143,.14);
  border:1px solid rgba(40,181,143,.32);border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--pix);font-size:10px;font-weight:700;color:#28b58f;flex-shrink:0;
}
.xtag{
  display:inline-block;background:rgba(40,181,143,.12);border:1px solid rgba(40,181,143,.26);
  border-radius:6px;padding:1px 10px;font-family:var(--pix);
  font-size:14px;font-weight:900;color:#28b58f;letter-spacing:.08em;
}

.name-box{
  background:rgba(37,50,59,.9);border:1px solid rgba(40,181,143,.18);
  border-radius:11px;padding:10px 12px;width:100%;max-width:340px;
  display:flex;align-items:center;gap:10px;
}
.nl{font-size:12px;color:rgba(40,181,143,.7);font-family:var(--arab);font-weight:700;min-width:52px;}
.ni{
  flex:1;background:rgba(22,36,44,.65);border:1px solid rgba(40,181,143,.22);
  border-radius:10px;padding:11px 12px;color:#e8f5f0;font-family:var(--arab);font-size:14px;
  line-height:1.2;direction:rtl;
  outline:none;
}
.ni:focus{border-color:#28b58f;box-shadow:0 0 0 3px rgba(40,181,143,.12);}

.lb{
  width:100%;max-width:340px;background:rgba(37,50,59,.9);
  border:1px solid rgba(40,181,143,.18);border-radius:11px;overflow:hidden;
}
.lb-h,.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;}
.lb-h{background:rgba(40,181,143,.08);font-family:var(--arab);font-size:11px;color:rgba(40,181,143,.7);font-weight:700;}
.lb-row{border-top:1px solid rgba(40,181,143,.12);font-family:var(--arab);font-size:13px;color:#b8d8d0;}
.lb-r{width:22px;text-align:center;color:rgba(232,245,240,.45);}
.lb-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-s{width:66px;text-align:left;color:#28b58f;font-weight:700;}
.lb-empty{padding:10px 12px;text-align:center;font-family:var(--arab);font-size:13px;color:rgba(232,245,240,.45);}

/* gender picker */
.grow{display:flex;gap:22px;justify-content:center;}
.gb{
  background:transparent;border:none;
  border-radius:0;padding:6px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .12s,filter .12s;color:#e8f5f0;font-family:var(--arab);
}
.gb .em{width:86px;height:86px;display:flex;align-items:center;justify-content:center;line-height:1;}
.gb .em svg{width:78px;height:78px;shape-rendering:crispEdges;image-rendering:pixelated;}
.gb .em .av{display:block;}
.gb span{display:none;}
.gb:hover .em,.gb.on .em{
  filter:drop-shadow(0 0 10px rgba(40,181,143,.35)) drop-shadow(0 0 2px rgba(40,181,143,.35));
  transform:translateY(-2px) scale(1.06);
}
.gb.on span{opacity:1;color:#28b58f;}
.gb:focus-visible{outline:2px solid rgba(40,181,143,.55);outline-offset:6px;border-radius:10px;}

/* start button */
.sbtn{
  background:linear-gradient(135deg,#28b58f,#1d8a6c);color:#1a2930;
  border:none;border-radius:11px;padding:11px 38px;
  font-size:15px;font-weight:900;font-family:var(--arab);
  cursor:pointer;transition:all .18s;letter-spacing:.02em;
}
.sbtn.alt{
  background:rgba(37,50,59,.85);
  border:1px solid rgba(40,181,143,.25);
  color:#e8f5f0;
}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(40,181,143,.32);}
.sbtn:disabled{opacity:.28;cursor:not-allowed;transform:none;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* streak bar (lives / combo) */
#streak-row{
  display:flex;align-items:center;gap:6px;
  font-family:var(--pix);font-size:12px;color:rgba(232,245,240,.4);
  flex-shrink:0;
}
.star{font-size:16px;filter:grayscale(1);opacity:.3;transition:all .3s;}
.star.lit{filter:none;opacity:1;}
</style>
</head>
<body>
<div id="G">
  <!-- HUD (play only) -->
  <div id="hud" style="display:none">
    <div class="hb"><div class="hl">نقاط</div><div class="hv" id="sc">0</div></div>
    <div id="tgt-wrap"><div id="tgt">—</div><div id="tsub"></div></div>
    <div class="hb"><div class="hl">وقت</div><div class="hv" id="tm">30</div></div>
  </div>

  <!-- Canvas -->
  <div id="cw">
    <canvas id="cv"></canvas>
    <canvas id="cc"></canvas>

    <!-- OVERLAY — start + end screen lives inside canvas area -->
    <div id="ov">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Bottom bar (play only) -->
  <div id="bar" style="display:none">
    <div id="streak-row">
      <span class="star" id="s0">⭐</span>
      <span class="star" id="s1">⭐</span>
      <span class="star" id="s2">⭐</span>
    </div>
    <div id="msg"></div>
    <div id="dp">
      <div class="db x"></div>
      <div class="db" id="d-up"    onpointerdown="dp('w',1)" onpointerup="dp('w',0)" onpointercancel="dp('w',0)">▲</div>
      <div class="db x"></div>
      <div class="db" id="d-left"  onpointerdown="dp('a',1)" onpointerup="dp('a',0)" onpointercancel="dp('a',0)">◀</div>
      <div class="db" id="d-act" onpointerdown="act()" aria-label="تفاعل">⏎</div>
      <div class="db" id="d-right" onpointerdown="dp('d',1)" onpointerup="dp('d',0)" onpointercancel="dp('d',0)">▶</div>
      <div class="db x"></div>
      <div class="db" id="d-down"  onpointerdown="dp('s',1)" onpointerup="dp('s',0)" onpointercancel="dp('s',0)">▼</div>
      <div class="db x"></div>
    </div>
  </div>
</div>

<script>
// ── prevent pull-to-refresh on dpad area
document.getElementById('dp').addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

// ── canvas
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const cc=document.getElementById('cc'),cctx=cc.getContext('2d');
const VW=560,VH=300;
const cwEl=document.getElementById('cw');
let DPR=1,SCALE=1,OX=0,OY=0;

function setAppHeight(){
  const h=Math.max(1,Math.round((window.visualViewport?.height)||window.innerHeight||0));
  document.documentElement.style.setProperty('--apph',h+'px');
}

function resize(){
  setAppHeight();
  const r=cwEl.getBoundingClientRect();
  DPR=window.devicePixelRatio||1;
  const pxW=Math.max(1,Math.round(r.width*DPR));
  const pxH=Math.max(1,Math.round(r.height*DPR));
  if(cv.width!==pxW||cv.height!==pxH){cv.width=pxW;cv.height=pxH;}
  if(cc.width!==pxW||cc.height!==pxH){cc.width=pxW;cc.height=pxH;}
  SCALE=Math.min(r.width/VW,r.height/VH)*DPR;
  OX=(cv.width-VW*SCALE)/2;
  OY=(cv.height-VH*SCALE)/2;
  ctx.imageSmoothingEnabled=false;
  cctx.imageSmoothingEnabled=false;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',resize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',resize);
  window.visualViewport.addEventListener('scroll',resize);
}

const CEIL=65,FLOORH=52;
const HALL_TOP=CEIL,HALL_BOT=VH-FLOORH,GROUND=HALL_BOT;
const DW=54,DH=82,DY=HALL_BOT-DH;
const MW={campus:1080,lobby:720,floor:1150};

const C={bg:'#1e2d35',wall:'#25323b',f1:'#2c3f4a',f2:'#273949',
  acc:'#28b58f',acd:'#1d8a6c',acl:'#5dd4b0',
  dk:'#25323b',gold:'#f4b942',red:'#ff6b6b',dim:'#7aA090'};

function beginFrame(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle=C.bg;
  ctx.fillRect(0,0,cv.width,cv.height);
  ctx.setTransform(SCALE,0,0,SCALE,OX,OY);
}

function beginConfFrame(){
  cctx.setTransform(1,0,0,1,0,0);
  cctx.clearRect(0,0,cc.width,cc.height);
  cctx.setTransform(SCALE,0,0,SCALE,OX,OY);
}

// ── state
let K={},state='menu',gender=null;
let P={},score=0,combo=0,timeLeft=90,timerInt=null;
let conf=[],raf=null,lastT=0,camX=0,shakeTicks=0;
let level=null,room=null;
let campusDoors=[],stairs=[],hallDoors=[];
let reaction=null;
let interact=null;
let TICK=0;

const HS_KEY='ertiwa_high_score';
const LS_KEY='ertiwa_last_score';
const LB_KEY='ertiwa_leaderboard';

let playerName=null;

function escHtml(s){
  return String(s).replace(/[&<>"']/g,m=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function loadName(){return '';}
function saveName(_n){}

function loadLeaderboard(){
  try{
    const raw=localStorage.getItem(LB_KEY);
    const arr=raw?JSON.parse(raw):[];
    if(!Array.isArray(arr))return [];
    return arr
      .filter(x=>x&&typeof x==='object'&&Number.isFinite(Number(x.score)))
      .map(x=>({name:String(x.name||'لاعب').slice(0,18),score:Number(x.score),t:Number(x.t)||0}));
  }catch(_){
    return [];
  }
}

function saveLeaderboard(arr){
  try{localStorage.setItem(LB_KEY,JSON.stringify(arr));}catch(_){}
}

function loadScores(){
  try{
    const hs=localStorage.getItem(HS_KEY);
    const ls=localStorage.getItem(LS_KEY);
    const high=hs==null?null:Number(hs);
    const last=ls==null?null:Number(ls);
    return{
      high:Number.isFinite(high)?high:null,
      last:Number.isFinite(last)?last:null
    };
  }catch(_){
    return{high:null,last:null};
  }
}

function saveScores({high,last}){
  try{
    if(high!=null)localStorage.setItem(HS_KEY,String(high));
    if(last!=null)localStorage.setItem(LS_KEY,String(last));
  }catch(_){}
}

let bgm=null;
let musicOn=true;
const MUSIC_KEY='ertiwa_music_on';
const AUDIO_DIR='.';
const HOME_SRC=`${AUDIO_DIR}/home.mp3`;
const GAME_SRC=`${AUDIO_DIR}/game.mp3`;
const LOSE_SRC=`${AUDIO_DIR}/lose.mp3`;
let audioUnlocked=false;
let currentLoop=null;
let desiredLoop='home';
let homeA=null,gameA=null,loseA=null;
let playToken=0;

function initMusic(){
  try{
    const v=localStorage.getItem(MUSIC_KEY);
    musicOn=v==null?true:(v==='1');
  }catch(_){
    musicOn=true;
  }
  try{
    homeA=new Audio(HOME_SRC);
    homeA.loop=true;
    homeA.volume=0.28;
    gameA=new Audio(GAME_SRC);
    gameA.loop=true;
    gameA.volume=0.42;
    loseA=new Audio(LOSE_SRC);
    loseA.loop=false;
    loseA.volume=0.75;
    bgm=homeA;
  }catch(_){
    homeA=null;gameA=null;loseA=null;bgm=null;
  }

  const unlock=()=>{
    audioUnlocked=true;
    if(desiredLoop)startLoop(desiredLoop);
  };
  document.addEventListener('pointerdown',unlock,{once:true});
  document.addEventListener('keydown',unlock,{once:true});
}

function stopLoops(){
  playToken++;
  if(homeA){try{homeA.pause();homeA.currentTime=0;}catch(_){}}
  if(gameA){try{gameA.pause();gameA.currentTime=0;}catch(_){}}
  currentLoop=null;
}

function startLoop(which){
  desiredLoop=which;
  if(!musicOn)return;
  if(which==='home'&&!homeA)return;
  if(which==='game'&&!gameA)return;
  if(!audioUnlocked)return;
  const a=which==='game'?gameA:homeA;
  if(!a)return;
  if(currentLoop===which&&!a.paused)return;
  stopLoops();
  const myToken=playToken;
  currentLoop=which;
  a.currentTime=0;
  const p=a.play();
  if(p&&p.then)p.then(()=>{
    if(myToken!==playToken||currentLoop!==which||!musicOn){
      try{a.pause();a.currentTime=0;}catch(_){}
    }
  }).catch(()=>{});
}

function playLose(){
  if(!loseA||!musicOn)return;
  stopLoops();
  if(!audioUnlocked)return;
  try{loseA.pause();loseA.currentTime=0;}catch(_){}
  const myToken=playToken;
  loseA.onended=null;
  loseA.currentTime=0;
  const p=loseA.play();
  if(p&&p.then)p.then(()=>{
    if(myToken!==playToken||!musicOn){
      try{loseA.pause();loseA.currentTime=0;}catch(_){}
    }
  }).catch(()=>{});
  loseA.onended=()=>{
    if(myToken!==playToken)return;
    startLoop('home');
  };
}

function setMusic(on){
  musicOn=!!on;
  try{localStorage.setItem(MUSIC_KEY,musicOn?'1':'0');}catch(_){}
  if(!musicOn){
    stopLoops();
    if(loseA){try{loseA.pause();loseA.currentTime=0;}catch(_){}}
    return;
  }
  startLoop(desiredLoop||'home');
}

function resetInputs(){
  K={};
  ['d-up','d-down','d-left','d-right','d-act'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
}

function fmtTime(s){
  s=Math.max(0,Math.floor(s));
  const m=Math.floor(s/60);
  const r=s%60;
  return m?`${m}:${String(r).padStart(2,'0')}`:String(r);
}

// ── dpad
function dp(k,v){
  K[k]=!!v;
  const nm={w:'up',s:'down',a:'left',d:'right'};
  document.getElementById('d-'+nm[k])?.classList.toggle('on',!!v);
}

function act(){
  const b=document.getElementById('d-act');
  b?.classList.add('on');
  setTimeout(()=>b?.classList.remove('on'),120);

}

// ── keyboard
document.addEventListener('keydown',e=>{
  const m={'ArrowUp':'w','ArrowDown':'s','ArrowLeft':'a','ArrowRight':'d'};
  K[e.key]=true;if(m[e.key])K[m[e.key]]=true;
  if(e.key==='Enter'||e.key===' '||e.key==='Space'){performInteract();e.preventDefault();return;}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{
  const m={'ArrowUp':'w','ArrowDown':'s','ArrowLeft':'a','ArrowRight':'d'};
  K[e.key]=false;if(m[e.key])K[m[e.key]]=false;
});

// ── room
function rndRoom(){
  const bs=[10,11,12,13,14,15];
  const b=bs[Math.floor(Math.random()*bs.length)];
  const f=1+Math.floor(Math.random()*4);
  const r=1+Math.floor(Math.random()*8);
  return{b,f,r,label:`${b}${f}0${r}`};
}
function setRoom(rm){
  room=rm;
  document.getElementById('tgt').textContent=rm.label;
  document.getElementById('tsub').textContent='';
}

// ── scenes
function mkCampus(){ campusDoors=[];[10,11,12,13,14,15].forEach((b,i)=>campusDoors.push({x:70+i*168,b})); }
function mkLobby(){ stairs=[];for(let f=1;f<=4;f++)stairs.push({x:55+(f-1)*172,f}); }
function mkFloor(){ hallDoors=[];for(let r=1;r<=8;r++)hallDoors.push({x:38+(r-1)*146,r}); }

// ── player
function initP(){P={x:50,y:GROUND-28,w:14,h:28,dir:1,aT:0,moving:false,vy:0,onGround:true};}
function resetCam(){camX=0;}

// ── streak stars
function updateStars(){
  for(let i=0;i<3;i++) document.getElementById('s'+i)?.classList.toggle('lit',i<combo);
}

// ── transitions
function goBuilding(b){
  if(b!==room.b){setMsg('مش هذا المبنى!','bad');shake();combo=0;updateStars();return;}
  level='lobby';mkLobby();initP();resetCam();
  setMsg('','');
}
function goFloor(f){
  if(f!==room.f){setMsg('مش هذا الطابق!','bad');shake();combo=0;updateStars();return;}
  level='floor';mkFloor();initP();resetCam();
  setMsg('','');
}
function goRoom(r){
  if(r!==room.r){setMsg('قاعة غلط!','bad');shake();combo=0;updateStars();return;}
  score++;combo=Math.min(combo+1,3);
  document.getElementById('sc').textContent=score;
  updateStars();
  spawnConf(P.x+P.w/2-camX,P.y);
  startReaction('happy');
  setMsg('🎉','ok');
  state='react';
  setTimeout(()=>{
    const nr=rndRoom();setRoom(nr);
    level='campus';mkCampus();initP();resetCam();
    setMsg('','');
    state='playing';reaction=null;
  },1400);
}
function goBack(){
  if(level==='floor'){level='lobby';mkLobby();initP();resetCam();}
  else if(level==='lobby'){level='campus';mkCampus();initP();resetCam();}
}

let lastInteract=0;
function findInteract(){
  const px=P.x+P.w/2,pb=P.y+P.h;
  if(P.x<6&&(level==='lobby'||level==='floor')) return {k:'back'};
  if(level==='campus'){
    for(const d of campusDoors) if(px>d.x+4&&px<d.x+DW-4&&pb>=DY+DH-6) return {k:'building',v:d.b};
  } else if(level==='lobby'){
    for(const s of stairs) if(px>s.x+4&&px<s.x+70&&pb>=DY+DH-6) return {k:'floor',v:s.f};
  } else if(level==='floor'){
    for(const d of hallDoors) if(px>d.x+4&&px<d.x+DW-4&&pb>=DY+DH-6) return {k:'room',v:d.r};
  }
  return null;
}

function updateHint(){
  const el=document.getElementById('msg');
  if(!el)return;
  if(interact){
    if(el.textContent===''||el.className==='tip') setMsg('اضغط Enter أو Space للدخول','tip');
  } else if(el.className==='tip'){
    setMsg('','');
  }
}

function performInteract(){
  if(state!=='playing')return;
  const now=Date.now();
  if(now-lastInteract<350)return;
  if(!interact)return;
  lastInteract=now;
  if(interact.k==='back') goBack();
  else if(interact.k==='building') goBuilding(interact.v);
  else if(interact.k==='floor') goFloor(interact.v);
  else if(interact.k==='room') goRoom(interact.v);
}

function setMsg(t,c){const el=document.getElementById('msg');el.textContent=t;el.className=c||'';}
function shake(){shakeTicks=10;}

// ── update
const SPD=2.8,GRAV=0.55;
function update(dt){
  if(state!=='playing'&&state!=='react')return;
  if(reaction)reaction.t+=dt;
  let dx=0;
  if(state==='playing'){
    if(K['a']||K['A']||K['ArrowLeft'])dx=-SPD;
    if(K['d']||K['D']||K['ArrowRight'])dx=SPD;
  }
  if(shakeTicks>0){dx+=(Math.random()-.5)*5;shakeTicks--;}
  P.moving=dx!==0;
  if(dx!==0)P.dir=dx>0?1:-1;
  if(P.moving)P.aT+=dt*.005;
  P.vy=(P.vy||0)+GRAV;P.y+=P.vy;
  const gy=GROUND-P.h;
  if(P.y>=gy){P.y=gy;P.vy=0;P.onGround=true;}
  if(reaction?.type==='happy'&&P.onGround&&reaction.t>180&&reaction.t<600){P.vy=-5;P.onGround=false;}
  const mw=MW[level]||VW;
  P.x=Math.max(0,Math.min(mw-P.w-4,P.x+dx));
  const tc=P.x-VW/2+P.w/2;
  camX=Math.max(0,Math.min(mw-VW,camX+(tc-camX)*.13));
  if(state==='playing'){interact=findInteract();updateHint();}
  conf.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.vy+=.18;c.vx*=.98;c.rot+=c.rv;c.life-=.02;});
  conf=conf.filter(c=>c.life>0);
}

// ── draw helpers
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawHall(){
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle=C.wall;ctx.fillRect(0,0,VW,HALL_TOP);
  ctx.fillStyle=C.wall;ctx.fillRect(0,HALL_BOT,VW,VH-HALL_BOT);
  const tW=50;
  for(let i=0;i<Math.ceil(VW/tW)+2;i++){
    const tx=i*tW-(camX%tW);
    ctx.fillStyle=Math.floor((i+(camX/tW|0))%2)===0?C.f1:C.f2;
    ctx.fillRect(tx,HALL_TOP,tW,HALL_BOT-HALL_TOP);
  }
  ctx.strokeStyle=C.acc;ctx.lineWidth=2;ctx.globalAlpha=.25;
  ctx.beginPath();ctx.moveTo(0,HALL_TOP);ctx.lineTo(VW,HALL_TOP);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,HALL_BOT);ctx.lineTo(VW,HALL_BOT);ctx.stroke();
  ctx.globalAlpha=1;
  const ls=130;
  for(let lx=ls/2-(camX%ls);lx<VW;lx+=ls){
    ctx.fillStyle='rgba(40,181,143,.65)';ctx.fillRect(lx-24,HALL_TOP,48,4);
    ctx.fillStyle='rgba(210,255,245,.85)';ctx.fillRect(lx-22,HALL_TOP,44,2);
    const lg=ctx.createLinearGradient(lx,HALL_TOP,lx,HALL_TOP+88);
    lg.addColorStop(0,'rgba(40,181,143,.08)');lg.addColorStop(1,'rgba(40,181,143,0)');
    ctx.fillStyle=lg;
    ctx.beginPath();ctx.moveTo(lx-22,HALL_TOP+2);ctx.lineTo(lx+22,HALL_TOP+2);
    ctx.lineTo(lx+64,HALL_TOP+88);ctx.lineTo(lx-64,HALL_TOP+88);ctx.closePath();ctx.fill();
  }
}

// NO hint highlighting — all doors look the same
function drawDoor(sx,label){
  const dy=DY,dw=DW,dh=DH;
  // facade
  ctx.fillStyle=C.dk;ctx.strokeStyle='rgba(40,100,75,.28)';ctx.lineWidth=.7;
  rr(sx-10,HALL_TOP+4,dw+20,dh+DY-HALL_TOP-4,4);ctx.fill();ctx.stroke();
  // door
  ctx.fillStyle='rgba(24,40,32,.85)';ctx.strokeStyle='rgba(40,100,75,.4)';ctx.lineWidth=1;
  rr(sx,dy,dw,dh,3);ctx.fill();ctx.stroke();
  // panels
  ctx.strokeStyle='rgba(28,62,48,.4)';ctx.lineWidth=.7;
  ctx.strokeRect(sx+4,dy+4,dw-8,dh/2-5);
  ctx.strokeRect(sx+4,dy+dh/2+2,dw-8,dh/2-7);
  // knob
  ctx.fillStyle='rgba(75,115,95,.55)';
  ctx.beginPath();ctx.arc(sx+9,dy+dh/2,3,0,Math.PI*2);ctx.fill();
  // label sign above
  if(label){
    ctx.fillStyle='rgba(33,48,40,.9)';ctx.strokeStyle='rgba(40,100,75,.28)';ctx.lineWidth=1;
    ctx.fillRect(sx+dw/2-16,dy-26,32,19);ctx.strokeRect(sx+dw/2-16,dy-26,32,19);
    ctx.fillStyle=C.dim;ctx.font='10px "Press Start 2P", Cairo, monospace';ctx.textAlign='center';
    ctx.fillText(label,sx+dw/2,dy-12);
  }
}

function drawBeam(cx,topY,baseY,topW,baseW){
  const t=(Math.sin((TICK||0)/180)+1)/2;
  const a=0.12+t*0.08;
  const g=ctx.createLinearGradient(0,topY,0,baseY);
  g.addColorStop(0,'rgba(40,181,143,0)');
  g.addColorStop(.35,`rgba(40,181,143,${a})`);
  g.addColorStop(1,'rgba(40,181,143,0)');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(cx-topW/2,topY);
  ctx.lineTo(cx+topW/2,topY);
  ctx.lineTo(cx+baseW/2,baseY);
  ctx.lineTo(cx-baseW/2,baseY);
  ctx.closePath();
  ctx.fill();
}

function drawDoorFocus(sx){
  drawBeam(sx+DW/2,HALL_TOP+6,DY+DH,44,110);
  ctx.save();
  ctx.shadowColor='rgba(40,181,143,.65)';
  ctx.shadowBlur=16;
  ctx.strokeStyle='rgba(40,181,143,.55)';
  ctx.lineWidth=1.2;
  rr(sx-2,DY-2,DW+4,DH+4,5);
  ctx.stroke();
  ctx.restore();
}

function drawStair(sx,floor){
  const sw=70,sh=DH+10,sy=DY-10;
  ctx.fillStyle='rgba(22,38,48,.8)';ctx.strokeStyle='rgba(40,100,75,.35)';ctx.lineWidth=1;
  rr(sx,sy,sw,sh,6);ctx.fill();ctx.stroke();
  const nst=5,sH=(sh-16)/nst;
  for(let s=0;s<nst;s++){
    ctx.fillStyle=`rgba(30,58,46,${.5-s*.06})`;
    ctx.fillRect(sx+8+s*2.5,sy+8+s*sH,sw-16-s*5,sH-2);
  }
  ctx.strokeStyle='rgba(40,100,75,.28)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(sx+sw/2-10,sy+8);ctx.lineTo(sx+sw/2-20,sy+sh-10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx+sw/2+10,sy+8);ctx.lineTo(sx+sw/2+20,sy+sh-10);ctx.stroke();
  ctx.fillStyle='rgba(40,181,143,.25)';ctx.font='16px "Press Start 2P", Cairo';ctx.textAlign='center';
  ctx.fillText(floor,sx+sw/2,sy+sh/2+9);
  ctx.fillStyle=C.dim;ctx.font='8px "Press Start 2P", Cairo';ctx.textAlign='center';
  ctx.fillText(`طابق ${floor}`,sx+sw/2,sy+sh+14);
}

function drawStairFocus(sx){
  const sw=70,sh=DH+10,sy=DY-10;
  drawBeam(sx+sw/2,HALL_TOP+6,sy+sh,44,120);
  ctx.save();
  ctx.shadowColor='rgba(40,181,143,.65)';
  ctx.shadowBlur=16;
  ctx.strokeStyle='rgba(40,181,143,.55)';
  ctx.lineWidth=1.2;
  rr(sx-2,sy-2,sw+4,sh+4,7);
  ctx.stroke();
  ctx.restore();
}

function drawScene(){
  drawHall();
  if(level==='campus'){
    campusDoors.forEach(d=>{
      const sx=d.x-camX;
      if(sx+DW<-20||sx>VW+20)return;
      if(interact?.k==='building'&&interact.v===d.b) drawDoorFocus(sx);
      // windows — same for all
      for(let w=0;w<2;w++){
        ctx.fillStyle='rgba(40,181,143,.06)';ctx.strokeStyle='rgba(40,100,75,.25)';ctx.lineWidth=.5;
        ctx.fillRect(sx-2+w*16,HALL_TOP+10,12,13);ctx.strokeRect(sx-2+w*16,HALL_TOP+10,12,13);
      }
      drawDoor(sx,String(d.b));
    });
  } else if(level==='lobby'){
    ctx.fillStyle=C.dim;ctx.font='9px "Press Start 2P", Cairo';ctx.textAlign='left';
    ctx.fillText('◀ خروج',8,HALL_BOT-8);
    stairs.forEach(s=>{
      const sx=s.x-camX;
      if(sx+70<-20||sx>VW+20)return;
      if(interact?.k==='floor'&&interact.v===s.f) drawStairFocus(sx);
      drawStair(sx,s.f);
    });
  } else if(level==='floor'){
    ctx.fillStyle=C.dim;ctx.font='9px "Press Start 2P", Cairo';ctx.textAlign='left';
    ctx.fillText('◀ رجوع',8,HALL_BOT-8);
    hallDoors.forEach(d=>{
      const sx=d.x-camX;
      if(sx+DW<-20||sx>VW+20)return;
      if(interact?.k==='room'&&interact.v===d.r) drawDoorFocus(sx);
      drawDoor(sx, d.r<10?'0'+d.r:String(d.r));
    });
  }
  // scene label chip
  const names={campus:'الحرم الجامعي',lobby:`مبنى ${room?.b}`,floor:`طابق ${room?.f}`};
  const sn=names[level];
  if(sn){
    ctx.fillStyle='rgba(40,181,143,.07)';ctx.fillRect(VW-134,5,129,19);
    ctx.fillStyle='rgba(40,181,143,.5)';ctx.font='8px "Press Start 2P", Cairo';ctx.textAlign='right';
    ctx.fillText(sn,VW-7,18);
  }
}

function drawPlayer(){
  if(P.x==null)return;
  const sx=P.x-camX,T=P.aT,G=gender,h=P.h;
  const bob=P.moving&&P.onGround?Math.sin(T*8)*1.5:0;
  const legS=P.moving&&P.onGround?Math.sin(T*8)*5:0;
  const armS=P.moving&&P.onGround?Math.sin(T*8)*4:0;
  const isSad=reaction?.type==='sad',isHappy=reaction?.type==='happy';
  const droop=isSad?Math.min(reaction.t/300,1)*6:0;
  const airUp=(isHappy&&!P.onGround)?-20:0;
  const o=bob+droop;
  const hdrop=isSad?Math.min(reaction.t/400,1)*5:0;
  const shSc=P.onGround?1:Math.max(.3,1-(GROUND-P.y-P.h)/55);
  const skin='#ffcba4',hair=G==='girl'?'#3d1f00':'#2a1500';
  const shirt=G==='girl'?'#ff62b4':'#2a7cc8';
  const pants=G==='girl'?'#ff2f97':'#1a4e8a';
  const shoe=G==='girl'?'#b31d64':'#122d5a';
  const bagC=G==='girl'?C.gold:'#1d8a6c';
  ctx.save();
  ctx.translate(sx+P.w/2,P.y+h/2);ctx.scale(P.dir,1);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.17)';ctx.beginPath();ctx.ellipse(0,h/2+2,8*shSc,3*shSc,0,0,Math.PI*2);ctx.fill();
  // backpack
  ctx.fillStyle=bagC;ctx.strokeStyle='rgba(0,0,0,.16)';ctx.lineWidth=.5;
  rr(3,-h/2+5+o,7,11,2);ctx.fill();ctx.stroke();
  // legs
  ctx.fillStyle=pants;ctx.fillRect(-5,o+2,4,10);ctx.fillRect(1,o+2,4,10);
  ctx.fillStyle=shoe;ctx.fillRect(-6+legS,o+11,6,3);ctx.fillRect(1-legS,o+11,6,3);
  // body
  ctx.fillStyle=shirt;
  if(G==='girl'){rr(-6,-h/2+10+o,12,13,3);ctx.fill();ctx.fillStyle='rgba(255,255,255,.1)';rr(-4,-h/2+11+o,8,7,2);ctx.fill();}
  else{rr(-6,-h/2+10+o,12,13,2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(0,-h/2+10+o);ctx.lineTo(0,-h/2+23+o);ctx.stroke();}
  // arms
  const aO=armS+airUp;
  ctx.fillStyle=shirt;ctx.fillRect(-9,-h/2+10+o+aO,3,8);ctx.fillRect(6,-h/2+10+o-aO,3,8);
  ctx.fillStyle=skin;ctx.fillRect(-9,-h/2+17+o+aO,3,4);ctx.fillRect(6,-h/2+17+o-aO,3,4);
  // neck
  ctx.fillStyle=skin;ctx.fillRect(-2,-h/2+8+o,4,4);
  // head
  ctx.fillStyle=skin;ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.ellipse(0,-h/2+4+o+hdrop,7,7,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // hair
  ctx.fillStyle=hair;
  if(G==='girl'){ctx.beginPath();ctx.ellipse(0,-h/2+1+o+hdrop,7.5,5,0,Math.PI,0);ctx.fill();ctx.beginPath();ctx.ellipse(-6,-h/2+4+o+hdrop,2,5,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(6,-h/2+4+o+hdrop,2,5,.3,0,Math.PI*2);ctx.fill();}
  else{ctx.beginPath();ctx.ellipse(0,-h/2+1+o+hdrop,7.5,4,0,Math.PI,0);ctx.fill();ctx.fillRect(-7,-h/2+1+o+hdrop,4,4);ctx.fillRect(3,-h/2+1+o+hdrop,4,3);}
  // face
  ctx.fillStyle='#1a0a00';
  if(isSad){
    ctx.strokeStyle='#1a0a00';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(-4,-h/2+3+o+hdrop);ctx.lineTo(-1,-h/2+5+o+hdrop);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4,-h/2+3+o+hdrop);ctx.lineTo(1,-h/2+5+o+hdrop);ctx.stroke();
    ctx.strokeStyle='#8b4513';ctx.lineWidth=.9;
    ctx.beginPath();ctx.arc(0,-h/2+7+o+hdrop,2.5,Math.PI+.3,Math.PI*2-.3);ctx.stroke();
  } else if(isHappy&&!P.onGround){
    ctx.strokeStyle='#1a0a00';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(-4,-h/2+5+o);ctx.lineTo(-2,-h/2+3+o);ctx.lineTo(0,-h/2+5+o);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-h/2+5+o);ctx.lineTo(2,-h/2+3+o);ctx.lineTo(4,-h/2+5+o);ctx.stroke();
    ctx.strokeStyle='#8b4513';ctx.lineWidth=.9;
    ctx.beginPath();ctx.arc(0,-h/2+5.5+o,3,.1,Math.PI-.1);ctx.stroke();
  } else {
    const blk=Math.floor(T*.5)%14===0;
    if(blk){ctx.fillRect(-3,-h/2+4+o,2,1);ctx.fillRect(1,-h/2+4+o,2,1);}
    else{ctx.beginPath();ctx.arc(-2,-h/2+4+o,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(2,-h/2+4+o,1.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(-1.2,-h/2+3.2+o,.6,0,Math.PI*2);ctx.fill();}
    ctx.strokeStyle='#8b4513';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(0,-h/2+5.5+o,2,.2,Math.PI-.2);ctx.stroke();
  }
  ctx.restore();
}

// ── confetti
function spawnConf(sx,sy){
  for(let i=0;i<26;i++){
    conf.push({x:sx,y:sy,vx:(Math.random()-.5)*9,vy:-Math.random()*7-2,
      color:['#28b58f','#f4b942','#ff6b9d','#7c6fec','#56cc7a','#ff8f8f'][Math.floor(Math.random()*6)],
      size:4+Math.random()*5,rot:Math.random()*360,rv:(Math.random()-.5)*9,life:1});
  }
}
function drawConf(){
  conf.forEach(c=>{
    cctx.save();cctx.globalAlpha=Math.max(0,c.life);
    cctx.translate(c.x,c.y);cctx.rotate(c.rot*Math.PI/180);
    cctx.fillStyle=c.color;cctx.fillRect(-c.size/2,-c.size/2,c.size,c.size*.6);
    cctx.restore();
  });
}

// ── loop
function loop(ts){
  TICK=ts;
  const dt=lastT?(ts-lastT):16;lastT=ts;
  update(dt);
  beginFrame();drawScene();drawPlayer();
  beginConfFrame();drawConf();
  if(state==='playing'||state==='react')raf=requestAnimationFrame(loop);
}

// ── boot
showHome();
initMusic();
resize();
beginFrame();
</script>
